            usemap과 name값이 같아야 한다.
            rect : 사각형(x1,y1,x2,y2)
            poly : 다각형(x1,y1,x2,y2,x3,y3,x4,y4,...)

            coords : 좌표

        <img usemap="값" src="경로/이미지파일명" alt="대체텍스트">
        <map name="값">
            <area shape="rect" coords="x1,y1,x2,y2" alt="대체텍스트">
            <area shape="poly" coords="x1,y1,x2,y2,x3,y3,x4,y4,..." alt="대체텍스트">
            <area shape="circle" coords="x,y,R" alt="대체텍스트">
        </map>
