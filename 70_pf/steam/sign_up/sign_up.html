<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign_up</title>
    <link rel="stylesheet" href="sign_up.css">
    <link rel="stylesheet" href="./../header/common.css">
</head>
<body>
        <div class="sign_up">
            <div class="sign_up_info">
                <div class="logo"><a href="#"><img src="./../images/logo.png" alt=""></a></div>
                <div class="text">
                    <p>스팀 계정 생성</p>
                </div>
            </div>
            <div class="position">
                <div class="step">
                    <div class="step_bar now_step"></div>
                    <div class="step_bar"></div>
                    <div class="step_bar"></div>
                    <div class="step_bar"></div>
                </div>
                <div class="sign_up_list">
                    <div class="sign_up_box">
                        <form action="">
                        <p>아이디 / 비밀번호 입력</p>
                            <input type="id" placeholder="Username" required>
                            <div>
                                <i class="fa-solid fa-circle-exclamation"></i>
                                <span>영문으로 시작하는 10~24자의 영문+숫자로 입력해주세요</span>
                            </div>
                            <input type="password" placeholder="Password" required> <br>
                            <input type="password" placeholder="Password" required>
                            <div>
                                <i class="fa-solid fa-circle-exclamation"></i>
                                <span>8자리 이상의 영문,숫자,특수문자 조합을 입력하세요</span>
                            </div>
                            <div class="btn">
                                <button type="button">&gt;</button>
                            </div>
                        </form>
                    </div> <!-- sign_up_box.end -->
                </div>  <!-- sign_up_list.end -->
            </div>  <!-- position.end -->
        </div>

    <script src="sign_up.js"></script>
</body>
</html>
