<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/common.css">
</head>

<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header_top">
            <div class="header_btn">
                <button>로그인</button>
                <button>회원가입</button>
            </div>
        </div>

        <div class="header_bottom">
            <h1 class="logo"><a href="#"><img src="images/logo.png" alt="스팀로고"></a></h1>
            <nav class="gnb">
                <ul class="main">
                    <li><a href="#" class="header_main">스토어</a>
                        <ul class="sub">
                            <li><a href="#">아케이드</a></li>
                            <li><a href="#">스포츠</a></li>
                            <li><a href="#">롤플레잉</a></li>
                        </ul>
                    </li>
                    <li><a href="#" class="header_main">랭킹</a>
                        <ul class="sub">
                            <li><a href="#">랭킹</a></li>
                        </ul>
                    </li>
                    <li><a href="#" class="header_main">커뮤니티</a>
                        <ul class="sub">
                            <li><a href="#">새로운소식</a></li>
                            <li><a href="#">리뷰</a></li>
                        </ul>
                    </li>
                    <li><a href="#" class="header_main">고객센터</a>
                        <ul class="sub">
                            <li><a href="#">QnA</a></li>
                            <li><a href="#">공지사항</a></li>
                        </ul>
                    </li>
                    <li><a href="#" class="header_main">브랜드소개</a>
                        <ul class="sub">
                            <li><a href="#">브랜드소개</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>


    <!-- section3 -->
     
    <section class="teaser-section">
        <h2 class="section-title">
            <span>신작 게임 티저 영상</span>
            <div class="gradient-line"></div>
        </h2>

        <div class="video-container">
            <iframe width="1073" height="431" src="https://www.youtube.com/embed/h2cksP9M5EE"
                title="떴다, 징크스! (Get Jinxed) | 롤 음악 - 리그 오브 레전드" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

        <!-- 라디오 버튼 3개 -->
        <input type="radio" name="slider" id="slide1" checked hidden>
        <input type="radio" name="slider" id="slide2" hidden>
        <input type="radio" name="slider" id="slide3" hidden>

        <div class="thumbnail-slider">
            <h3 class="thumbnail-title">티저 영상 더 보기</h3>

            <div class="slider-wrapper">
                <!-- 왼쪽 이전 버튼 라벨 3개 -->
                <label for="slide3" class="arrow left left-slide3">
                    <img src="./images/button-left.png" alt="left">
                </label>
                <label for="slide1" class="arrow left left-slide1">
                    <img src="./images/button-left.png" alt="left">
                </label>
                <label for="slide2" class="arrow left left-slide2">
                    <img src="./images/button-left.png" alt="left">
                </label>

                <div class="thumbnail-track">
                    <!-- 1~4 썸네일 -->
                    <div class="slide slide-1">
                        <img src="./images/thumbnail1.png" alt="Palworld" />
                        <img src="./images/thumbnail2.png" alt="Elden Ring" />
                        <img src="./images/thumbnail3.png" alt="Counter Strike" />
                        <img src="./images/thumbnail4.png" alt="Left 4 Dead" />
                    </div>
                    <!-- 5~8 썸네일 -->
                    <div class="slide slide-2">
                        <img src="./images/thumbnail5.jpg" alt="Zomboid" />
                        <img src="./images/thumbnail6.jpg" alt="Stardew Valley" />
                        <img src="./images/thumbnail7.jpg" alt="GTA VI" />
                        <img src="./images/thumbnail8.jpg" alt="Starfield" />
                    </div>
                    <!-- 1~4 썸네일 복제본 -->
                    <div class="slide slide-3">
                        <img src="./images/thumbnail1.png" alt="Palworld" />
                        <img src="./images/thumbnail2.png" alt="Elden Ring" />
                        <img src="./images/thumbnail3.png" alt="Counter Strike" />
                        <img src="./images/thumbnail4.png" alt="Left 4 Dead" />
                    </div>
                </div>

                <!-- 오른쪽 다음 버튼 라벨 3개 -->
                <label for="slide2" class="arrow right right-slide2">
                    <img src="./images/button-right.png" alt="right">
                </label>
                <label for="slide3" class="arrow right right-slide3">
                    <img src="./images/button-right.png" alt="right">
                </label>
                <label for="slide1" class="arrow right right-slide1">
                    <img src="./images/button-right.png" alt="right">
                </label>
            </div>
        </div>
    </section>


    <script src="index.js"></script>
</body>

</html>
