<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam</title>
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>

  <body>
    <!-- 헤더 -->
    <header class="header">
      <div class="header_top">
        <div class="header_user">
          <a href="sub/login.html" class="login">로그인</a>
          <a href="sub/sign_up.html" class="sign_up">회원가입</a>
          <div class="user_ui">
            <img src="images/index/header/person.png" alt="유저모양 아이콘" />
            <span class="username_show"></span>
          </div>
        </div>
      </div>

      <div class="header_bottom">
        <h1 class="logo">
          <a href="#"
            ><img src="images/index/header/logo.png" alt="스팀로고"
          /></a>
        </h1>
        <nav class="gnb">
          <ul class="main">
            <li>
              <a href="#" class="header_main">스토어</a>
              <ul class="sub">
                <li><a href="#">아케이드</a></li>
                <li><a href="#">스포츠</a></li>
                <li><a href="#">롤플레잉</a></li>
              </ul>
            </li>
            <li>
              <a href="#" class="header_main">랭킹</a>
              <ul class="sub">
                <li><a href="#">랭킹</a></li>
              </ul>
            </li>
            <li>
              <a href="#" class="header_main">커뮤니티</a>
              <ul class="sub">
                <li><a href="#">새로운소식</a></li>
                <li><a href="#">리뷰</a></li>
              </ul>
            </li>
            <li>
              <a href="#" class="header_main">고객센터</a>
              <ul class="sub">
                <li><a href="#">QnA</a></li>
                <li><a href="#">공지사항</a></li>
              </ul>
            </li>
            <li>
              <a href="#" class="header_main">브랜드소개</a>
              <ul class="sub">
                <li><a href="#">브랜드소개</a></li>
              </ul>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- ================================================================= -->

    <div class="sec2_container">
      <h2>지금 플레이하세요.</h2>
      <div class="sec2_slide_full">
        <div class="sec2_card_slide">
          <div class="sec2_slider" id="sec2_slider">
            <div class="sec2_card_wrap">
              <div class="sec2_card">
                <img src="./images/index/sec2/card1.jpg" alt="갓 오브 워 이미지"/>
              </div>
              <p>갓 오브 워 라그나로크</p>
            </div>
            <div class="sec2_card_wrap">
              <div class="sec2_card">
                <img src="./images/index/sec2/card2.jpg" alt="마블 스파이더맨 이미지"
                />
              </div>
              <p>마블 스파이더맨2</p>
            </div>
            <div class="sec2_card_wrap">
              <div class="sec2_card">
                <img src="./images/index/sec2/card3.jpg" alt="언틸다운 이미지"/>
              </div>
              <p>언틸다운</p>
            </div>
            <div class="sec2_card_wrap">
              <div class="sec2_card">
                <img src="./images/index/sec2/card4.jpg" alt="헬다이버즈2 이미지"/>
              </div>
              <p>헬다이버즈2</p>
            </div>
            <div class="sec2_card_wrap">
              <div class="sec2_card">
                <img src="./images/index/sec2/card5.jpg" alt="스텔라블레이드2 이미지"/>
              </div>
              <p>스텔라 블레이드2</p>
            </div>
          </div><!-- sec2_slider.end -->
          <!-- <div class="sec2_slide_btn">&#9654;</div> -->
        </div>
        <div class="sec2_slide_btn">&#9654;</div>
      </div>
      <!-- card_slide 끝 -->

      <div class="sec2_notice">
        <h3>신규소식</h3>
        <div class="sec2_notice_box">
          <div class="sec2_notice1">
            <img
              src="./images/index/sec2/notice1.jpg"
              alt="공지사항 썸네일1번"
            />
          </div>
          <div class="sec2_notice2">
            <img
              src="./images/index/sec2/notice2.jpg"
              alt="공지사항 썸네일2번"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- ================================================================== -->

    <section class="sec3_teaser_section">
      <h2 class="sec3_title">
        <span>신작 게임 티저 영상</span>
        <div class="gradient_line"></div>
      </h2>

      <div class="sec3_video_container">
        <iframe
          width="1073"
          height="431"
          src="https://www.youtube.com/embed/h2cksP9M5EE"
          title="떴다, 징크스! (Get Jinxed) | 롤 음악 - 리그 오브 레전드"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>

      <!-- 라디오 버튼 3개 -->
      <input type="radio" name="slider" id="sec3_slide1" checked hidden />
      <input type="radio" name="slider" id="sec3_slide2" hidden />
      <input type="radio" name="slider" id="sec3_slide3" hidden />

      <div class="sec3_thumbnail_slider">
        <h3 class="sec3_thumbnail_title">티저 영상 더 보기</h3>

        <div class="sec3_slider_wrapper">
          <!-- 왼쪽 이전 버튼 라벨 3개 -->
          <label for="sec3_slide3" class="sec3_arrow sec3_left sec3_left_slide3">
            <img src="./images/index/sec3/button-left.png" alt="left" />
          </label>
          <label for="sec3_slide1" class="sec3_arrow sec3_left sec3_left_slide1">
            <img src="./images/index/sec3/button-left.png" alt="left" />
          </label>
          <label for="sec3_slide2" class="sec3_arrow sec3_left sec3_left_slide2">
            <img src="./images/index/sec3/button-left.png" alt="left" />
          </label>

          <div class="sec3_thumbnail_track">
            <!-- 1~4 썸네일 -->
            <div class="sec3_slide sec3_slide_1">
              <img src="./images/index/sec3/thumbnail1.png" alt="Cyber Punk" />
              <img src="./images/index/sec3/thumbnail2.png" alt="Palworld" />
              <img src="./images/index/sec3/thumbnail3.jpg" alt="Elden Ring" />
              <img
                src="./images/index/sec3/thumbnail4.png"
                alt="Counter Strike2"
              />
            </div>
            <!-- 5~8 썸네일 -->
            <div class="sec3_slide sec3_slide_2">
              <img
                src="./images/index/sec3/thumbnail5.jpg"
                alt="Left 4 Dead2"
              />
              <img
                src="./images/index/sec3/thumbnail6.jpg"
                alt="Project Zomboid"
              />
              <img
                src="./images/index/sec3/thumbnail7.jpg"
                alt="Stardew Valley"
              />
              <img
                src="./images/index/sec3/thumbnail8.jpg"
                alt="Hollow Knight"
              />
            </div>
            <!-- 1~4 썸네일 복제본 -->
            <div class="sec3_slide sec3_slide_3">
              <img src="./images/index/sec3/thumbnail1.png" alt="Cyber Punk" />
              <img src="./images/index/sec3/thumbnail2.png" alt="Palworld" />
              <img src="./images/index/sec3/thumbnail3.jpg" alt="Elden Ring" />
              <img
                src="./images/index/sec3/thumbnail4.png"
                alt="Counter Strike2"
              />
            </div>
          </div>

          <!-- 오른쪽 다음 버튼 라벨 3개 -->
          <label for="sec3_slide2" class="sec3_arrow sec3_right sec3_right_slide2">
            <img src="./images/index/sec3/button-right.png" alt="right" />
          </label>
          <label for="sec3_slide3" class="sec3_arrow sec3_right sec3_right_slide3">
            <img src="./images/index/sec3/button-right.png" alt="right" />
          </label>
          <label for="sec3_slide1" class="sec3_arrow sec3_right sec3_right_slide1">
            <img src="./images/index/sec3/button-right.png" alt="right" />
          </label>
        </div>
      </div>
    </section>
    <script src="./js/index.js"></script>
  </body>
</html>
