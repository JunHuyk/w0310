<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Navigation Bar(GNB,글로벌 내비게이션바)</title>
    <style>
        /* 공통 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        ul {
            list-style: none;
        }
        body {
            font: 15/1.6 '돋움', sans-serif;
            color:#333;
        }
        a {
            text-decoration: none;
            color: #333;
        }
        /* GNB */
        /* 폰트 위계 */
        .gnb .main>li>a {
            font-size: 18px;
            font-weight: bold;
            display: block;
            width: 200px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            background: #acc;
            color:#999;
        }
        .gnb .sub a {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <header>
        <nav class="gnb">
            <ul class="main">
                <li><a href="#">대학소개</a>
                    <ul class="sub">
                        <li><a href="#">총장소개</a></li>
                        <li><a href="#">대학혁신지원사업</a></li>
                        <li><a href="#">역사 / 상징</a></li>
                        <li><a href="#">대학 기관 규정</a></li>
                    </ul>
                </li>
                <li><a href="#">입학안내</a>
                    <ul class="sub">
                        <li><a href="#">대학입학</a></li>
                        <li><a href="#">대학원입학</a></li>
                        <li><a href="#">특수대학원 입학</a></li>
                        <li><a href="#">외국인유학생 입학</a></li>
                    </ul>
                </li>
                <li><a href="#">교육</a>
                    <ul class="sub">
                        <li><a href="#">일반대학원</a></li>
                        <li><a href="#">특수대학원</a></li>
                        <li><a href="#">어학교육</a></li>
                        <li><a href="#">글로벌교육</a></li>
                    </ul>
                </li>
                <li><a href="#">대학생활</a>
                    <ul class="sub">
                        <li><a href="#">학사안내</a></li>
                        <li><a href="#">등록/장학</a></li>
                        <li><a href="#">학생지원</a></li>
                        <li><a href="#">학생활동</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
