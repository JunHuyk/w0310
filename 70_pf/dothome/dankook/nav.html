<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Navigation Bar(GNB,글로벌 내비게이션바)</title>
    <style>
        /* 공통 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        ul {
            list-style: none;
        }
        body {
            font: 15/1.6 '돋움', sans-serif;
            color:#333;
        }
        a {
            text-decoration: none;
            color: #333;
        }
        header {
            width: 1320px;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto;
        }
        /* GNB */
        /* 폰트 위계 */
        /* 1depth */
        .main { 
            display: flex;
        }
        
        .main>li {
            display: block;
            font-size: 20px;
            font-weight: bold;
            display: block;
            width: 200px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            color:#999;
        }

        .main li a:hover {
            color:skyblue;
        }
        /* 2depth */
        .sub {
            height: 0;
            opacity: 0;
            visibility: hidden;
            overflow: hidden;
            line-height: 2;
            transition: .3s;
            background: rgba(0,0,0,0.5);
            padding: 10px 0 20px;
        }
        .main>li:hover .sub{
            height: 200px;
            opacity: 1;
            visibility: visible;
        }

        .gnb .sub a {
            font-size: 14px;
        }
    </style>
</head>

<body>
    <header>
        <h1><img src="logo.png" alt="단국대학교 로고"></h1>
        <nav class="gnb">
            <ul class="main">
                <li><a href="#">대학소개</a>
                    <ul class="sub">
                        <li><a href="#">총장소개</a></li>
                        <li><a href="#">대학혁신지원사업</a></li>
                        <li><a href="#">역사 / 상징</a></li>
                        <li><a href="#">대학 기관 규정</a></li>
                    </ul>
                </li>
                <li><a href="#">입학안내</a>
                    <ul class="sub">
                        <li><a href="#">대학입학</a></li>
                        <li><a href="#">대학원입학</a></li>
                        <li><a href="#">특수대학원 입학</a></li>
                        <li><a href="#">외국인유학생 입학</a></li>
                    </ul>
                </li>
                <li><a href="#">교육</a>
                    <ul class="sub">
                        <li><a href="#">일반대학원</a></li>
                        <li><a href="#">특수대학원</a></li>
                        <li><a href="#">어학교육</a></li>
                        <li><a href="#">글로벌교육</a></li>
                    </ul>
                </li>
                <li><a href="#">대학생활</a>
                    <ul class="sub">
                        <li><a href="#">학사안내</a></li>
                        <li><a href="#">등록/장학</a></li>
                        <li><a href="#">학생지원</a></li>
                        <li><a href="#">학생활동</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
