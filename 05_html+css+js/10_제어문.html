<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문</title>
</head>
<body>
    <script>
        /* 
            제어문
                1. 조건문 : if ,else if, else 
                2. 선택문 : switch/case
                3. 반복문 : while,do while, for
                4. 기타 : break, continue
        */
       const num = 12;
        if (num > 10) {
            console.log("num은 10보다 큼");
        } else if(num < 10) {
            console.log("num은 10보다 작음")
        }   else {
            console.log("num은 10")
        }
       
    </script>
</body>
</html>
