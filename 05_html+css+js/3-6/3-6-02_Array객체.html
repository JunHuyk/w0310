<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내장 객체</title>
</head>

<body>
  <script>
    /*
      사용자 정의 객체
      const obj = {
        속성 : 값,
        메서드 : function(){},
        ...
      };

      Array 객체
        객체 리터럴 처럼 변수에 데이터값을 필요한 대로 저장할 수 있다.
        객체 리터럴은 데이터 값을 '이름:값'으로 저장하는 반면, 저장된 값에 자동으로 index를 부여한다.

      배열 생성
        const arr = [
          10,
          '값',
          true,
          function(){}
          {}
          []
          ...
        ];
        배열 참조
          변수[idx];
          -> idx는 0,1,2,...

        속성
          length
        메서드
          slice()
          join()
          concat()
          toString()
          shift()
          unshift()
          pop()
          push()
          splice()
          reverse()
          sort(function(){})
    */

    //숫자 생성
    const num1 = new Number(10);
    const num2 = 10;

    //문자열 생성
    const str1 = new String("javascript");
    const str2 = 'javascript';

    //배열 생성
    const arr1 = new Array(10, 20, 'javascript', 'jquery');
    const arr2 = [10, 20, 'javascript', 'jquery'];
    console.log(typeof arr1);
    console.log(typeof arr2);

    //배열 참조
    console.log(arr1[0]); // 10
    console.log(arr1[1]); // 20
    console.log(arr1[2]); // javascript
    console.log(arr1[3]); // jquery


    // sort -> 오름차순 정렬
    const info = [45, 11, 7, 32, 20, 19];
    info.sort(function (a, b) { // 콜백함수
      // < 0 -> a가 앞으로
      // > 0 -> b가 앞으로
      // === 0 -> 위치 변경 없음 
      // ex)
      // step1 : a=11,b=45 -> a-b = -34 -> [11,45]
      // step2 : a=7, b=45 -> a-b = -38 -> [11,7,45]
      // step3 : a=11, b=7 -> a-b = 4 -> [7,11,45]
      return a - b; // 값이 양수면 위치를 바꿈, 음수면 제자리
    });
    console.log(info); // [7,11,19,20,32,45]
    console.log(info.toString()); // 7,11,19,20,32,45
    console.log(info.toString().split()); // ['7','11','19','20','32','45'] 문자열 배열

  </script>
</body>

</html>
